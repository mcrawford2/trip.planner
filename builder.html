<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderPlan | Build Your Trip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1fa2e1',
                        secondary: '#10b47a',
                        accent: '#f5b957',
                        background: '#f8fafc',
                        foreground: '#0f172a',
                        muted: '#f1f5f9',
                        'muted-foreground': '#64748b'
                    },
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        body: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        };
    </script>
</head>
<body class="relative min-h-screen overflow-x-hidden bg-background text-foreground font-body antialiased">
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-b from-black/45 via-primary/40 to-background/90"></div>
        <img
            src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?ixlib=rb-4.0.3&auto=format&fit=crop&w=1974&q=80"
            alt="Scenic mountain travel view"
            class="h-full w-full object-cover"
        >
    </div>

    <main class="relative z-10 mx-auto max-w-4xl px-6 py-10 sm:py-16">
        <div class="mb-8 flex items-center justify-between gap-4">
            <div>
                <p class="text-sm font-semibold uppercase tracking-wide text-primary">Trip Builder</p>
                <h1 class="font-display text-4xl font-extrabold text-white drop-shadow-md sm:text-6xl">Start Building Your Trip</h1>
                <p class="mt-2 text-white/90">Set your basics below and create your first itinerary draft.</p>
            </div>
            <a href="index.html" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">Back to Home</a>
        </div>

        <section>
            <form id="trip-builder-form" action="itinerary.html" class="grid gap-5 sm:grid-cols-2">
                <label class="block sm:col-span-2">
                    <span class="mb-2 block text-sm font-semibold text-white">Trip Name</span>
                    <input type="text" name="tripName" placeholder="e.g., Japan Spring Adventure" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />
                </label>

                <label class="block">
                    <span class="mb-2 block text-sm font-semibold text-white">Destination</span>
                    <input type="text" name="destination" placeholder="e.g., Tokyo, Japan" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />
                </label>

                <label class="block">
                    <span class="mb-2 block text-sm font-semibold text-white">Travelers</span>
                    <input type="number" name="travelers" min="1" value="2" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />
                </label>

                <label class="block">
                    <span class="mb-2 block text-sm font-semibold text-white">Start Date</span>
                    <input type="date" name="startDate" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />
                </label>

                <label class="block">
                    <span class="mb-2 block text-sm font-semibold text-white">End Date</span>
                    <input type="date" name="endDate" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />
                </label>

                <label class="block sm:col-span-2">
                    <span class="mb-2 block text-sm font-semibold text-white">Budget</span>
                    <input type="text" name="budget" placeholder="e.g., $2,500" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" />
                </label>

                <label class="block sm:col-span-2">
                    <span class="mb-2 block text-sm font-semibold text-white">What do you want to do?</span>
                    <textarea rows="4" name="activities" placeholder="Food tours, museums, beach days, hiking..." class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20"></textarea>
                </label>

                <div class="sm:col-span-2 flex flex-wrap items-center gap-3 pt-2">
                    <button type="submit" class="rounded-full bg-primary px-6 py-3 font-semibold text-white transition hover:bg-primary/90">Create My Itinerary</button>
                    <p class="text-sm text-muted-foreground">You can edit everything later.</p>
                </div>
            </form>
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
